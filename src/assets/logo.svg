<svg viewBox="0 0 100 125" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <!-- Top-to-bottom gradient for lines and nodes: navy → teal -->
    <linearGradient id="lineG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#12355f"/>
      <stop offset="55%"  stop-color="#1275a0"/>
      <stop offset="100%" stop-color="#1fb8d0"/>
    </linearGradient>
    <!-- Glow halo behind center node -->
    <radialGradient id="haloG" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1fb8d0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1fb8d0" stop-opacity="0"/>
    </radialGradient>
    <!-- Node gradient: dark blue → cyan -->
    <linearGradient id="nodeG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a4a80"/>
      <stop offset="100%" stop-color="#1fb8d0"/>
    </linearGradient>
  </defs>

  <!-- ── GLOW HALO around center node ── -->
  <circle cx="50" cy="62" r="16" fill="url(#haloG)"/>

  <!-- ── TOP HORIZONTAL BAR ── -->
  <!-- Main bar line -->
  <line x1="17" y1="18" x2="83" y2="18" stroke="url(#lineG)" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Left micro-extension -->
  <line x1="10" y1="18" x2="17" y2="18" stroke="#12355f" stroke-width="1.1" stroke-linecap="round" opacity="0.55"/>
  <!-- Right micro-extension -->
  <line x1="83" y1="18" x2="90" y2="18" stroke="#12355f" stroke-width="1.1" stroke-linecap="round" opacity="0.55"/>

  <!-- ── VERTICAL STEM ── -->
  <line x1="50" y1="18" x2="50" y2="62" stroke="url(#lineG)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ── TOP BAR NODES (7 + 2 extensions) ── -->
  <circle cx="10" cy="18" r="2"   fill="#12355f" opacity="0.55"/>
  <circle cx="17" cy="18" r="2.8" fill="#12355f"/>
  <circle cx="33" cy="18" r="3.2" fill="#163e70"/>
  <circle cx="50" cy="18" r="3.8" fill="#1a5a95"/>
  <circle cx="67" cy="18" r="3.2" fill="#163e70"/>
  <circle cx="83" cy="18" r="2.8" fill="#12355f"/>
  <circle cx="90" cy="18" r="2"   fill="#12355f" opacity="0.55"/>

  <!-- ── CENTER GLOW NODE ── -->
  <circle cx="50" cy="62" r="7"   fill="#1295b5" opacity="0.5"/>
  <circle cx="50" cy="62" r="5"   fill="#1fb8d0"/>
  <circle cx="50" cy="62" r="2.5" fill="white"   opacity="0.75"/>

  <!-- ── 7 RADIATING LINES ── -->
  <line x1="50" y1="62" x2="14"  y2="105" stroke="#1295b5" stroke-width="1.1" stroke-linecap="round" opacity="0.80"/>
  <line x1="50" y1="62" x2="25"  y2="110" stroke="#1295b5" stroke-width="1.1" stroke-linecap="round" opacity="0.85"/>
  <line x1="50" y1="62" x2="37"  y2="113" stroke="#1295b5" stroke-width="1.1" stroke-linecap="round" opacity="0.90"/>
  <line x1="50" y1="62" x2="50"  y2="116" stroke="#1fb8d0" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="50" y1="62" x2="63"  y2="113" stroke="#1295b5" stroke-width="1.1" stroke-linecap="round" opacity="0.90"/>
  <line x1="50" y1="62" x2="75"  y2="110" stroke="#1295b5" stroke-width="1.1" stroke-linecap="round" opacity="0.85"/>
  <line x1="50" y1="62" x2="86"  y2="105" stroke="#1295b5" stroke-width="1.1" stroke-linecap="round" opacity="0.80"/>

  <!-- ── END DOTS ON RADIATING LINES ── -->
  <circle cx="14"  cy="105" r="2.2" fill="#1fb8d0" opacity="0.75"/>
  <circle cx="25"  cy="110" r="2.4" fill="#1fb8d0" opacity="0.80"/>
  <circle cx="37"  cy="113" r="2.6" fill="#1fb8d0" opacity="0.87"/>
  <circle cx="50"  cy="116" r="3.0" fill="#1fb8d0"/>
  <circle cx="63"  cy="113" r="2.6" fill="#1fb8d0" opacity="0.87"/>
  <circle cx="75"  cy="110" r="2.4" fill="#1fb8d0" opacity="0.80"/>
  <circle cx="86"  cy="105" r="2.2" fill="#1fb8d0" opacity="0.75"/>
</svg>

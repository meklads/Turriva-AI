<svg viewBox="0 0 105 115" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <!-- Radial glow for bottom node -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#00d4ff" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#00b8ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00b8ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ══ BEZIER LINES — each node curves to glow at (55,95) ══ -->
  <!-- From Row-1 nodes -->
  <path d="M 10 16 C 10 60, 55 65, 55 95" stroke="#1a5acc" stroke-width="1.15" stroke-linecap="round" opacity="0.75"/>
  <path d="M 25 16 C 25 58, 55 65, 55 95" stroke="#1a68d4" stroke-width="1.15" stroke-linecap="round" opacity="0.80"/>
  <path d="M 40 16 C 40 56, 55 65, 55 95" stroke="#1a88e0" stroke-width="1.20" stroke-linecap="round" opacity="0.85"/>
  <path d="M 55 16 C 55 55, 55 65, 55 95" stroke="#00a8dc" stroke-width="1.25" stroke-linecap="round" opacity="0.90"/>
  <!-- From Row-2 nodes -->
  <path d="M 18 32 C 18 62, 55 68, 55 95" stroke="#1a5acc" stroke-width="1.10" stroke-linecap="round" opacity="0.70"/>
  <path d="M 33 32 C 33 61, 55 68, 55 95" stroke="#1a78d8" stroke-width="1.10" stroke-linecap="round" opacity="0.78"/>
  <path d="M 48 32 C 48 60, 55 68, 55 95" stroke="#00b0e4" stroke-width="1.15" stroke-linecap="round" opacity="0.85"/>

  <!-- ══ HORIZONTAL LINES — Row 1 ══ -->
  <line x1="10" y1="16" x2="25" y2="16" stroke="#1a3888" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="25" y1="16" x2="40" y2="16" stroke="#1a5aaa" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="40" y1="16" x2="55" y2="16" stroke="#1a78c4" stroke-width="1.4" stroke-linecap="round"/>

  <!-- ══ HORIZONTAL LINES — Row 2 ══ -->
  <line x1="18" y1="32" x2="33" y2="32" stroke="#1a4898" stroke-width="1.25" stroke-linecap="round"/>
  <line x1="33" y1="32" x2="48" y2="32" stroke="#1a68b8" stroke-width="1.25" stroke-linecap="round"/>

  <!-- ══ DIAGONAL CONNECTORS between rows ══ -->
  <line x1="10" y1="16" x2="18" y2="32" stroke="#1a3070" stroke-width="1.05" stroke-linecap="round" opacity="0.65"/>
  <line x1="25" y1="16" x2="18" y2="32" stroke="#1a3878" stroke-width="1.05" stroke-linecap="round" opacity="0.60"/>
  <line x1="25" y1="16" x2="33" y2="32" stroke="#1a5098" stroke-width="1.05" stroke-linecap="round" opacity="0.60"/>

  <!-- ══ GLOW HALO ══ -->
  <circle cx="55" cy="95" r="18" fill="url(#glow)"/>
  <circle cx="55" cy="95" r="10" fill="#00c0f0" opacity="0.18"/>

  <!-- ══ ROW-1 NODES (dark navy → lighter) ══ -->
  <circle cx="10" cy="16" r="5.0" fill="#111e5a"/>
  <circle cx="25" cy="16" r="4.5" fill="#1a3480"/>
  <circle cx="40" cy="16" r="4.0" fill="#1a58a8"/>
  <circle cx="55" cy="16" r="3.5" fill="#1a78c8"/>

  <!-- ══ ROW-2 NODES ══ -->
  <circle cx="18" cy="32" r="4.0" fill="#152870"/>
  <circle cx="33" cy="32" r="3.5" fill="#1a4898"/>
  <circle cx="48" cy="32" r="3.0" fill="#1a68b8"/>

  <!-- ══ CENTRAL GLOW NODE ══ -->
  <circle cx="55" cy="95" r="7.5" fill="#00a8e0"/>
  <circle cx="55" cy="95" r="5.0" fill="#00c8f8"/>
  <circle cx="55" cy="95" r="2.5" fill="white"  opacity="0.90"/>
</svg>
